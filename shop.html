<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | SoleStride</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="shop.css">
</head>

<body>

    <div class="navbar">
        <div class="logo">Sole<span>Stride</span></div>
        <div class="search-bar">
            <input type="text" id="globalSearch" placeholder="Search shoes...">
            <button id="searchBtn"><i class="fa fa-search"></i></button>
        </div>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="javascript:void(0)" class="cart-icon" onclick="openCart()">
                <i class="fa fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>

    <div class="main-container">
        <h2 id="mainCaption">ALL Footwear</h2>
        <div>
            <button class="filterbtn" data-category="all">ALL</button>
            <button class="filterbtn" data-category="men">MEN</button>
            <button class="filterbtn" data-category="women">WOMEN</button>
            <button class="filterbtn" data-category="kids">KIDS</button>
        </div>
        <div class="product-grid" id="productContainer"></div>
    </div>

    <!-- Cart Sidebar -->
    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fa fa-shopping-cart"></i> Your Cart</h3><button class="close-cart"
                onclick="closeCart()">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: PKR <span id="cartTotal">0</span>/-</div><button class="checkout-btn"
                onclick="goToCheckout()">Checkout</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>

    <script>
        // Shop page initialization
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        const searchParam = urlParams.get('search');
       
        let currentFilter = 'all';
        if (categoryParam) currentFilter = categoryParam;

        function renderShopProducts() {
            let filtered = [...products];
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.category === currentFilter);
            }
            if (searchParam) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchParam));
                document.getElementById('mainCaption').textContent = 'Search: "' + searchParam + '"';
            } else if (currentFilter !== 'all') {
                document.getElementById('mainCaption').textContent = currentFilter.toUpperCase() + ' Footwear';
            } else {
                document.getElementById('mainCaption').textContent = 'ALL Footwear';
            }

            const container = document.getElementById('productContainer');
            container.innerHTML = '';

            filtered.forEach(product => {
                let finalPrice = product.price;
                if (product.hasDiscount && product.discountText) {
                    const disc = parseInt(product.discountText);
                    if (!isNaN(disc)) finalPrice = product.price - (product.price * disc / 100);
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                <img src="${product.images[0]}" alt="${product.name}">
                <div class="product-info">
                    <div class="product-name">${product.name} ${product.hasDiscount ? `<span class="discount-badge">${product.discountText}</span>` : ''}</div>
                    <div class="product-price">PKR ${Math.floor(finalPrice)}/-</div>
                    <div style="font-size: 12px; color: #666; margin-top: 5px;">${product.description.substring(0, 60)}...</div>
                </div>
                <button class="add-to-cart-btn" data-id="${product.id}">Add to Cart</button>
            `;

                const addBtn = card.querySelector('.add-to-cart-btn');
                addBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addToCart(product);
                });

                card.addEventListener('click', () => {
                    window.location.href = `pdp.html?id=${product.id}`;
                });

                container.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.filterbtn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.getAttribute('data-category');
                renderShopProducts();
            });
            if (btn.getAttribute('data-category') === currentFilter) {
                btn.classList.add('active');
            }
        });

        renderShopProducts();
    </script>
</body>

</html>
