<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SoleStride</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Sole<span>Stride</span></div>
    <div class="search-bar">
        <input type="text" id="globalSearch" placeholder="Search shoes...">
        <button id="searchBtn"><i class="fa fa-search"></i></button>
    </div>
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="javascript:void(0)" class="cart-icon" onclick="openCart()">
            <i class="fa fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </a>
    </div>
</div>

<div class="checkout-container">
    <h2><i class="fa fa-credit-card"></i> Checkout</h2>
    <form id="checkoutForm">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="emailAddress" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phoneNumber" placeholder="Enter your phone number" required>
        </div>
        <div class="form-group">
            <label>Shipping Address *</label>
            <input type="text" id="shippingAddress" placeholder="Street address, city" required>
        </div>
        
        <div class="payment-method">
            <h3>Payment Method</h3>
            <label style="display: flex; align-items: center; gap: 10px;">
                <input type="radio" name="payment" value="COD" checked> Cash on Delivery (COD)
            </label>
        </div>

        <div class="order-summary" id="orderSummary">
            <!-- Total will show here -->
        </div>

        <button type="submit" class="btn-confirm">Confirm Order <i class="fa fa-check"></i></button>
    </form>
</div>

<!-- Cart Sidebar -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fa fa-shopping-cart"></i> Your Cart</h3>
        <button class="close-cart" onclick="closeCart()">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <div class="cart-total">Total: PKR <span id="cartTotal">0</span>/-</div>
        <button class="checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>
    </div>
</div>

<script>
    // ========== CART FUNCTIONS ==========
    function getCart() {
        return JSON.parse(localStorage.getItem('cart') || '[]');
    }

    function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        updateCartSidebar();
    }

    function updateCartCount() {
        const cart = getCart();
        const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        document.querySelectorAll('.cart-count').forEach(el => {
            if (el) el.textContent = totalItems;
        });
    }

    function updateCartSidebar() {
        const cart = getCart();
        const cartItemsDiv = document.getElementById('cartItems');
        const cartTotalSpan = document.getElementById('cartTotal');
        
        if (!cartItemsDiv) return;
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p style="text-align:center; padding:2rem;">Your cart is empty 🛒</p>';
            if (cartTotalSpan) cartTotalSpan.textContent = '0';
            return;
        }
        
        let total = 0;
        cartItemsDiv.innerHTML = '';
        
        cart.forEach((item, index) => {
            let finalPrice = item.price;
            if (item.hasDiscount && item.discountText) {
                const disc = parseInt(item.discountText);
                if (!isNaN(disc)) finalPrice = item.price - (item.price * disc / 100);
            }
            const itemTotal = Math.floor(finalPrice) * (item.quantity || 1);
            total += itemTotal;
            
            cartItemsDiv.innerHTML += `
                <div class="cart-item" style="display: flex; gap: 1rem; padding: 0.8rem; border-bottom: 1px solid #eee;">
                    <img src="${item.image}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 12px;">
                    <div style="flex:1">
                        <div><strong>${item.name}</strong></div>
                        <div>PKR ${Math.floor(finalPrice)}/-</div>
                        <div>Qty: ${item.quantity || 1} | Size: ${item.selectedSize || 'N/A'}</div>
                    </div>
                    <div style="color: red; cursor: pointer;" onclick="removeFromCart(${index})"><i class="fa fa-trash"></i></div>
                </div>
            `;
        });
        
        if (cartTotalSpan) cartTotalSpan.textContent = total;
    }

    function removeFromCart(index) {
        let cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        updateOrderSummary();
    }

    function updateOrderSummary() {
        const cart = getCart();
        const summaryDiv = document.getElementById('orderSummary');
        if (!summaryDiv) return;
        
        if (cart.length === 0) {
            summaryDiv.innerHTML = '<h4>Your cart is empty</h4><p>Please add some items to checkout</p>';
            return;
        }
        
        let subtotal = 0;
        cart.forEach(item => {
            let finalPrice = item.price;
            if (item.hasDiscount && item.discountText) {
                const disc = parseInt(item.discountText);
                if (!isNaN(disc)) finalPrice = item.price - (item.price * disc / 100);
            }
            subtotal += Math.floor(finalPrice) * (item.quantity || 1);
        });
        
        const shipping = subtotal > 5000 ? 0 : 250;
        const total = subtotal + shipping;
        
        summaryDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Subtotal:</span>
                <span>PKR ${subtotal.toLocaleString()}/-</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Shipping:</span>
                <span>${shipping === 0 ? 'FREE' : 'PKR ' + shipping}/-</span>
            </div>
            <hr style="margin: 10px 0; border-color: rgba(255,255,255,0.2);">
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
                <strong>Total:</strong>
                <strong>PKR ${total.toLocaleString()}/-</strong>
            </div>
        `;
    }

    function openCart() {
        document.getElementById('cartSidebar')?.classList.add('open');
        document.getElementById('overlay')?.classList.add('active');
        updateCartSidebar();
    }

    function closeCart() {
        document.getElementById('cartSidebar')?.classList.remove('open');
        document.getElementById('overlay')?.classList.remove('active');
    }

    function goToCheckout() {
        window.location.href = 'checkout.html';
    }

    // ========== CHECKOUT FORM SUBMIT - CART EMPTY KAREGA ==========
    document.getElementById('checkoutForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const cart = getCart();
        
        if (cart.length === 0) {
            alert('❌ Your cart is empty! Please add some items first.');
            window.location.href = 'shop.html';
            return;
        }
        
        const name = document.getElementById('fullName')?.value || 'Customer';
        const email = document.getElementById('emailAddress')?.value;
        const address = document.getElementById('shippingAddress')?.value;
        
        // Show confirmation message
        alert(`✅ ORDER CONFIRMED! ✅\n\nThank you ${name}!\n\n📧 Email: ${email}\n📦 Address: ${address}\n\nYour order has been placed successfully.\nYou will receive tracking details within 24 hours.\n\n🛒 Your cart has been emptied.`);
        
        // 🔥 IMPORTANT: Empty the cart 🔥
        localStorage.removeItem('cart');
        
        // Update cart display
        updateCartCount();
        updateCartSidebar();
        
        // Redirect to home page after 2 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    });

    // ========== HAMBURGER MENU ==========
    document.getElementById('hamburger')?.addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('show');
    });

    // ========== SEARCH ==========
    document.getElementById('searchBtn')?.addEventListener('click', () => {
        const query = document.getElementById('globalSearch').value.toLowerCase();
        if (query) window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
    });

    // ========== INITIALIZE ==========
    updateCartCount();
    updateCartSidebar();
    updateOrderSummary();
</script>
</body>
</html>
