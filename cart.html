<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Bata</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
        }
 
        .navbar {
            background-color: #d4002a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .navbar h1 {
            font-size: 24px;
        }
 
        .cart-icon {
            font-size: 20px;
            cursor: pointer;
        }
 
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
 
        .cart-title {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }
 
        .cart-empty {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
 
        .cart-empty p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
 
        .back-to-shop {
            display: inline-block;
            background-color: #d4002a;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
 
        .back-to-shop:hover {
            background-color: #a00020;
        }
 
        .cart-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
 
        .cart-items {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
 
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
 
        .cart-item:last-child {
            border-bottom: none;
        }
 
        .item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
        }
 
        .item-details {
            flex: 1;
        }
 
        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
 
        .item-size {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
 
        .item-price {
            font-size: 16px;
            color: #d4002a;
            font-weight: bold;
        }
 
        .item-original-price {
            text-decoration: line-through;
            color: #999;
            margin-right: 10px;
        }
 
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
 
        .qty-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 3px;
            font-size: 16px;
        }
 
        .qty-btn:hover {
            background-color: #f0f0f0;
        }
 
        .qty-display {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }
 
        .remove-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
 
        .remove-btn:hover {
            background-color: #cc0000;
        }
 
        .cart-summary {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
 
        .summary-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
 
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
 
        .summary-row:last-child {
            border-bottom: none;
        }
 
        .summary-label {
            color: #666;
        }
 
        .summary-value {
            font-weight: bold;
            color: #333;
        }
 
        .summary-total {
            font-size: 18px;
            color: #d4002a;
        }
 
        .checkout-btn {
            width: 100%;
            background-color: #d4002a;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
 
        .checkout-btn:hover {
            background-color: #a00020;
        }
 
        .continue-shopping {
            width: 100%;
            background-color: #f0f0f0;
            color: #333;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
 
        .continue-shopping:hover {
            background-color: #e0e0e0;
        }
 
        @media (max-width: 768px) {
            .cart-wrapper {
                grid-template-columns: 1fr;
            }
 
            .cart-summary {
                position: relative;
                top: 0;
            }
 
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
 
            .item-details {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <h1>🛍️ BATA</h1>
        <div class="cart-icon">🛒 Cart (<span id="cart-count">0</span>)</div>
    </div>
 
    <!-- Main Container -->
    <div class="container">
        <h2 class="cart-title">Shopping Cart</h2>
 
        <!-- Empty Cart Message -->
        <div id="empty-cart" class="cart-empty" style="display: none;">
            <p>Your cart is empty!</p>
            <a href="index.html" class="back-to-shop">Continue Shopping</a>
        </div>
 
        <!-- Cart Items & Summary -->
        <div id="cart-content" class="cart-wrapper" style="display: none;">
            <!-- Left: Cart Items -->
            <div class="cart-items" id="cart-items-container">
                <!-- Items will be added here by JavaScript -->
            </div>
 
            <!-- Right: Summary -->
            <div class="cart-summary">
                <div class="summary-title">Order Summary</div>
 
                <div class="summary-row">
                    <span class="summary-label">Subtotal:</span>
                    <span class="summary-value">PKR <span id="subtotal">0</span></span>
                </div>
 
                <div class="summary-row">
                    <span class="summary-label">Shipping:</span>
                    <span class="summary-value">PKR <span id="shipping">0</span></span>
                </div>
 
                <div class="summary-row">
                    <span class="summary-label">Tax:</span>
                    <span class="summary-value">PKR <span id="tax">0</span></span>
                </div>
 
                <div class="summary-row summary-total">
                    <span>Total:</span>
                    <span>PKR <span id="total">0</span></span>
                </div>
 
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                <button class="continue-shopping" onclick="window.location.href='index.html'">Continue Shopping</button>
            </div>
        </div>
    </div>
</body>
</html>
